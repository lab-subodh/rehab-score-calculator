<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neuro Rehab Scoring Calculator</title>
<style>
:root {
  --teal: #0d7377;
  --teal-light: #e0f5f5;
  --teal-mid: #14a3a8;
  --slate: #1e293b;
  --slate-mid: #475569;
  --slate-light: #94a3b8;
  --border: #dde3eb;
  --bg: #f0f4f8;
  --surface: #ffffff;
  --green: #16a34a; --green-bg: #f0fdf4;
  --amber: #b45309; --amber-bg: #fffbeb;
  --red: #dc2626; --red-bg: #fef2f2;
  --r: 8px; --rl: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-size: 14px; line-height: 1.5; color: var(--slate); background: var(--bg); }
.app { max-width: 1140px; margin: 0 auto; padding: 1.25rem 1rem; }

header { margin-bottom: 1.25rem; display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
header h1 { font-size: 18px; font-weight: 700; color: var(--teal); letter-spacing: -0.02em; }
header p { font-size: 12px; color: var(--slate-light); }

.layout { display: grid; grid-template-columns: 1fr 320px; gap: 1.25rem; align-items: start; }
@media (max-width: 820px) { .layout { grid-template-columns: 1fr; } }

.form-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); overflow: hidden; }

.tab-bar { display: flex; flex-wrap: wrap; gap: 3px; padding: 10px 12px 0; background: var(--bg); border-bottom: 1px solid var(--border); }
.tab { padding: 5px 10px; border: 1px solid transparent; border-bottom: none; border-radius: 6px 6px 0 0; background: transparent; color: var(--slate-light); cursor: pointer; font-size: 11px; font-family: inherit; white-space: nowrap; }
.tab:hover { background: var(--surface); color: var(--slate-mid); }
.tab.on { background: var(--surface); color: var(--teal); border-color: var(--border); border-bottom-color: var(--surface); font-weight: 600; margin-bottom: -1px; }

.sec { display: none; padding: 1.25rem; }
.sec.on { display: block; }
.sec-h { font-size: 14px; font-weight: 600; color: var(--slate); margin-bottom: 0.75rem; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.sub { font-size: 10px; font-weight: 700; color: var(--slate-light); text-transform: uppercase; letter-spacing: 0.07em; margin: 14px 0 8px; }
.hint { font-size: 11px; color: var(--slate-light); margin-bottom: 12px; line-height: 1.4; }

.fg2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.fg3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.f { display: flex; flex-direction: column; gap: 3px; }
.f label { font-size: 11px; color: var(--slate-mid); font-weight: 500; }
select { width: 100%; padding: 5px 7px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--slate); font-size: 12px; font-family: inherit; cursor: pointer; outline: none; }
select:focus { border-color: var(--teal); }

.tog { display: inline-flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; margin-bottom: 1rem; }
.tb { padding: 5px 14px; border: none; background: transparent; color: var(--slate-mid); cursor: pointer; font-size: 12px; font-family: inherit; }
.tb.on { background: var(--teal); color: #fff; font-weight: 600; }

.nav-row { display: flex; justify-content: space-between; margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid var(--border); }
.nbtn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--slate); cursor: pointer; font-size: 12px; font-family: inherit; }
.nbtn:hover { background: var(--bg); }
.nbtn.p { background: var(--teal); color: #fff; border-color: var(--teal); }

.results-panel { position: sticky; top: 1rem; display: flex; flex-direction: column; gap: 10px; }

.score-duo { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.big-s { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); padding: 1rem; }
.big-s .bl { font-size: 10px; color: var(--slate-light); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.big-s .bv { font-size: 34px; font-weight: 700; line-height: 1; color: var(--teal); margin-bottom: 6px; letter-spacing: -0.03em; }
.big-s .bb { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
.h-bg { background: var(--green-bg); color: var(--green); }
.m-bg { background: var(--amber-bg); color: var(--amber); }
.l-bg { background: var(--red-bg); color: var(--red); }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); padding: 1rem; }
.card-h { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--slate-light); margin-bottom: 10px; }

.domain-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); }
.domain-row:last-child { border-bottom: none; }
.dr-lbl { font-size: 11px; color: var(--slate-mid); width: 110px; flex-shrink: 0; }
.dr-bar-wrap { flex: 1; height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; }
.dr-bar { height: 100%; border-radius: 2px; background: var(--teal); transition: width 0.4s ease; }
.dr-val { font-size: 12px; font-weight: 600; color: var(--slate); width: 36px; text-align: right; flex-shrink: 0; }

.triage-val { font-size: 13px; font-weight: 700; color: var(--teal); margin-bottom: 3px; }
.triage-desc { font-size: 11px; color: var(--slate-mid); line-height: 1.4; }

.flag-item { display: flex; gap: 7px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 11px; color: var(--slate); align-items: flex-start; }
.flag-item:last-child { border-bottom: none; }
.fd { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.fw { background: var(--amber); }
.fa { background: var(--red); }

.me-interp { margin-top: 8px; padding: 8px 10px; background: var(--teal-light); border-radius: 6px; font-size: 11px; color: var(--teal); line-height: 1.4; display: none; }
.me-interp.show { display: block; }
</style>
</head>
<body>
<div class="app">
<header>
  <h1>Neuro Rehab Scoring Calculator</h1>
  <p>GRS · RPI · Triage Classification · Domain Profile</p>
</header>

<div class="layout">
<div class="form-panel">
  <div class="tab-bar" id="tabBar"></div>
  <div id="sections"></div>
</div>

<div class="results-panel">
  <div class="score-duo">
    <div class="big-s">
      <div class="bl">Global Recovery</div>
      <div class="bv" id="grsV">—</div>
      <div class="bb" id="grsBadge">—</div>
    </div>
    <div class="big-s">
      <div class="bl">Rehab Potential</div>
      <div class="bv" id="rpiV">—</div>
      <div class="bb" id="rpiBadge">—</div>
    </div>
  </div>

  <div class="card">
    <div class="card-h">Domain Profile (radar)</div>
    <canvas id="radar" width="290" height="270"></canvas>
  </div>

  <div class="card">
    <div class="card-h">Domain Breakdown</div>
    <div id="domainList"></div>
  </div>

  <div class="card" id="triageCard">
    <div class="card-h">Admission Triage</div>
    <div class="triage-val" id="triageV">—</div>
    <div class="triage-desc" id="triageD">Complete all sections to generate triage.</div>
  </div>

  <div class="card" id="flagsCard" style="display:none">
    <div class="card-h">Clinical Decision Flags</div>
    <div id="flagsList"></div>
  </div>
</div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
const TABS = ['Cognition','Tone','Strength','Trunk','Motor Tasks','Sensory','Mobility','Endurance','Motor FIM'];
let cogMode = 'gcs';
let radarChart = null;

function masOpts(def=0) {
  const opts = [[0,'0 — No increase'],[1,'1 — Slight (catch)'],[2,'1+ — Slight (catch + resistance)'],[3,'2 — Marked increase'],[4,'3 — Considerable increase'],[5,'4 — Rigid']];
  return opts.map(([v,t]) => `<option value="${v}"${v===def?' selected':''}>${t}</option>`).join('');
}
function mrcOpts(def=3) {
  const opts = [[5,'5 — Normal power'],[4,'4 — Against resistance'],[3,'3 — Against gravity'],[2,'2 — Without gravity'],[1,'1 — Flicker/trace'],[0,'0 — No contraction']];
  return opts.map(([v,t]) => `<option value="${v}"${v===def?' selected':''}>${t}</option>`).join('');
}
function fimOpts(def=4) {
  const opts = [[7,'7 — Complete independence'],[6,'6 — Modified independence'],[5,'5 — Supervision/setup'],[4,'4 — Minimal assist (≥75%)'],[3,'3 — Moderate assist (50–74%)'],[2,'2 — Maximal assist (25–49%)'],[1,'1 — Total assist (<25%)']];
  return opts.map(([v,t]) => `<option value="${v}"${v===def?' selected':''}>${t}</option>`).join('');
}
function selOpts(pairs, def) {
  return pairs.map(([v,t]) => `<option value="${v}"${v===def?' selected':''}>${t}</option>`).join('');
}

const SECTION_HTML = [
`<div class="sec-h">Cognition</div>
<div class="tog">
  <button class="tb on" id="gcsBtn" onclick="setCogMode('gcs')">GCS — Low Level</button>
  <button class="tb" id="mmseBtn" onclick="setCogMode('mmse')">MMSE — Higher Level</button>
</div>
<div id="gcsDiv">
  <div class="fg3">
    <div class="f"><label>Eye Opening (E) 1–4</label>
      <select id="gcsE" onchange="calc()">
        ${selOpts([[4,'4 — Spontaneous'],[3,'3 — To speech'],[2,'2 — To pain'],[1,'1 — No response']],4)}
      </select>
    </div>
    <div class="f"><label>Verbal Response (V) 1–5</label>
      <select id="gcsV" onchange="calc()">
        ${selOpts([[5,'5 — Oriented'],[4,'4 — Confused'],[3,'3 — Inappropriate words'],[2,'2 — Incomprehensible sounds'],[1,'1 — No response']],4)}
      </select>
    </div>
    <div class="f"><label>Motor Response (M) 1–6</label>
      <select id="gcsM" onchange="calc()">
        ${selOpts([[6,'6 — Obeys commands'],[5,'5 — Localizes'],[4,'4 — Withdraws'],[3,'3 — Abnormal flexion'],[2,'2 — Extension'],[1,'1 — No response']],5)}
      </select>
    </div>
  </div>
</div>
<div id="mmseDiv" style="display:none">
  <div class="fg2">
    <div class="f"><label>A. Orientation — Time (0–5)</label><select id="mmseA" onchange="calc()">${selOpts([[5,5],[4,4],[3,3],[2,2],[1,1],[0,0]],5)}</select></div>
    <div class="f"><label>B. Orientation — Place (0–5)</label><select id="mmseB" onchange="calc()">${selOpts([[5,5],[4,4],[3,3],[2,2],[1,1],[0,0]],5)}</select></div>
  </div>
  <div class="fg2">
    <div class="f"><label>C. Registration (0–3)</label><select id="mmseC" onchange="calc()">${selOpts([[3,3],[2,2],[1,1],[0,0]],3)}</select></div>
    <div class="f"><label>D. Attention & Calculation (0–5)</label><select id="mmseD" onchange="calc()">${selOpts([[5,5],[4,4],[3,3],[2,2],[1,1],[0,0]],4)}</select></div>
  </div>
  <div class="fg2">
    <div class="f"><label>E. Delayed Recall (0–3)</label><select id="mmseE" onchange="calc()">${selOpts([[3,3],[2,2],[1,1],[0,0]],2)}</select></div>
    <div class="f"><label>F. Language (0–8)</label><select id="mmseF" onchange="calc()">${selOpts([[8,8],[7,7],[6,6],[5,5],[4,4],[3,3],[2,2],[1,1],[0,0]],7)}</select></div>
  </div>
  <div class="fg2">
    <div class="f"><label>G. Visuospatial Copying (0–1)</label><select id="mmseG" onchange="calc()">${selOpts([[1,'1 — Correct'],[0,'0 — Incorrect']],1)}</select></div>
  </div>
</div>
<div class="sub">Cognition Overlay — mandatory for all patients</div>
<div class="fg2">
  <div class="f"><label>Command Following (0–2)</label>
    <select id="cmdFol" onchange="calc()">
      ${selOpts([[2,'2 — Follows 3/3'],[1,'1 — Follows 1/3 or 2/3'],[0,'0 — Follows 0/3']],1)}
    </select>
  </div>
  <div class="f"><label>Attention / Digit Span (0–2)</label>
    <select id="digitSpan" onchange="calc()">
      ${selOpts([[2,'2 — Passes 4-digit span'],[1,'1 — Passes 3-digit span only'],[0,'0 — Fails 3-digit span']],1)}
    </select>
  </div>
</div>`,

`<div class="sec-h">Tone / Spasticity — Modified Ashworth Scale</div>
<p class="hint">Passively move joint at moderate speed. Score worst resistance felt. 0=none · 1=slight catch · 1+=catch+resistance · 2=marked · 3=considerable · 4=rigid</p>
<div class="sub">Upper Limb — 5 sites (max 25)</div>
<div class="fg2">
  <div class="f"><label>Shoulder adductors / internal rotators</label><select id="masShAdd" onchange="calc()">${masOpts()}</select></div>
  <div class="f"><label>Elbow flexors</label><select id="masElFx" onchange="calc()">${masOpts()}</select></div>
</div>
<div class="fg2">
  <div class="f"><label>Forearm pronators</label><select id="masFAPr" onchange="calc()">${masOpts()}</select></div>
  <div class="f"><label>Wrist flexors</label><select id="masWrFx" onchange="calc()">${masOpts()}</select></div>
</div>
<div class="fg2">
  <div class="f"><label>Finger flexors</label><select id="masFinFx" onchange="calc()">${masOpts()}</select></div>
</div>
<div class="sub">Lower Limb — 4 sites (max 20)</div>
<div class="fg2">
  <div class="f"><label>Hip adductors</label><select id="masHipAd" onchange="calc()">${masOpts()}</select></div>
  <div class="f"><label>Knee flex/ext dominant pattern</label><select id="masKnee" onchange="calc()">${masOpts()}</select></div>
</div>
<div class="fg2">
  <div class="f"><label>Ankle plantarflexors</label><select id="masAnkPF" onchange="calc()">${masOpts()}</select></div>
  <div class="f"><label>Toe flexors</label><select id="masToeFx" onchange="calc()">${masOpts()}</select></div>
</div>`,

`<div class="sec-h">Strength — MRC Scale</div>
<p class="hint">0=no contraction · 1=flicker · 2=movement without gravity · 3=against gravity · 4=against resistance · 5=normal</p>
<div class="sub">Upper Limb — 5 muscles (max 25)</div>
<div class="fg2">
  <div class="f"><label>Shoulder abduction</label><select id="mrcShAb" onchange="calc()">${mrcOpts()}</select></div>
  <div class="f"><label>Elbow flexion</label><select id="mrcElFx" onchange="calc()">${mrcOpts()}</select></div>
</div>
<div class="fg2">
  <div class="f"><label>Wrist extension</label><select id="mrcWrEx" onchange="calc()">${mrcOpts()}</select></div>
  <div class="f"><label>Finger flexion</label><select id="mrcFinFx" onchange="calc()">${mrcOpts()}</select></div>
</div>
<div class="fg2">
  <div class="f"><label>Finger abduction</label><select id="mrcFinAb" onchange="calc()">${mrcOpts()}</select></div>
</div>
<div class="sub">Lower Limb — 5 muscles (max 25)</div>
<div class="fg2">
  <div class="f"><label>Hip flexion</label><select id="mrcHipFx" onchange="calc()">${mrcOpts()}</select></div>
  <div class="f"><label>Knee extension</label><select id="mrcKnEx" onchange="calc()">${mrcOpts()}</select></div>
</div>
<div class="fg2">
  <div class="f"><label>Ankle dorsiflexion</label><select id="mrcAnkDF" onchange="calc()">${mrcOpts()}</select></div>
  <div class="f"><label>Great toe extension</label><select id="mrcGrToe" onchange="calc()">${mrcOpts()}</select></div>
</div>
<div class="fg2">
  <div class="f"><label>Plantarflexion</label><select id="mrcPF" onchange="calc()">${mrcOpts()}</select></div>
</div>`,

`<div class="sec-h">Trunk Stability / Core Control</div>
<p class="hint">Patient sitting unsupported, feet supported. Static: 30 sec upright. Dynamic: reach forward 10–15 cm and return. Score best of 2 trials.</p>
<div class="fg2">
  <div class="f"><label>Trunk Stability Score (0–2)</label>
    <select id="trunk" onchange="calc()">
      ${selOpts([[2,'2 — Stable trunk + controlled reach without sway'],[1,'1 — Sits 30 sec but uses hands / poor dynamic control'],[0,'0 — Cannot sit unsupported ≥10 sec']],1)}
    </select>
  </div>
</div>`,

`<div class="sec-h">Motor Task Function (0–2 each)</div>
<p class="hint">2 attempts per task, score best. Allow 1 verbal cue only. Physical assistance = cannot score 2. Use affected side primarily for UL tasks.</p>
<div class="fg2">
  <div class="f"><label>1. Reach</label>
    <select id="tskReach" onchange="calc()">
      ${selOpts([[2,'2 — Reaches ≥2/3 directions, no trunk compensation'],[1,'1 — Partial reach or only 1 direction'],[0,'0 — Cannot lift arm toward target']],1)}
    </select>
  </div>
  <div class="f"><label>2. Grasp</label>
    <select id="tskGrasp" onchange="calc()">
      ${selOpts([[2,'2 — Holds independently for 10 sec'],[1,'1 — Partial or unstable grasp'],[0,'0 — Cannot grasp']],1)}
    </select>
  </div>
</div>
<div class="fg2">
  <div class="f"><label>3. Release</label>
    <select id="tskRelease" onchange="calc()">
      ${selOpts([[2,'2 — Releases smoothly within 5 sec'],[1,'1 — Partial / slow release'],[0,'0 — Cannot release']],1)}
    </select>
  </div>
  <div class="f"><label>4. Sitting Balance</label>
    <select id="tskSitBal" onchange="calc()">
      ${selOpts([[2,'2 — Stable + dynamic reach without loss'],[1,'1 — Sits 30 sec, loses balance with reach'],[0,'0 — Cannot sit unsupported 10 sec']],1)}
    </select>
  </div>
</div>
<div class="fg2">
  <div class="f"><label>5. Sit-to-Stand</label>
    <select id="tskSTS" onchange="calc()">
      ${selOpts([[2,'2 — Rises independently, no physical assist'],[1,'1 — Rises using hands / minimal assist'],[0,'0 — Cannot rise even with help']],1)}
    </select>
  </div>
  <div class="f"><label>6. Standing Balance</label>
    <select id="tskStBal" onchange="calc()">
      ${selOpts([[2,'2 — Independent + dynamic weight shift'],[1,'1 — Stands with support, unstable dynamically'],[0,'0 — Cannot stand']],1)}
    </select>
  </div>
</div>
<div class="fg2">
  <div class="f"><label>7. Walking (10 m min 6 m; aid allowed)</label>
    <select id="tskWalk" onchange="calc()">
      ${selOpts([[2,'2 — Independent walking (device allowed)'],[1,'1 — Walks with physical assist / unsafe'],[0,'0 — Cannot walk']],1)}
    </select>
  </div>
</div>`,

`<div class="sec-h">Sensory–Perceptual (0–2 each)</div>
<p class="hint">Eyes closed. Compare affected vs unaffected side. Trial test on normal side first. 3 trials per site, score for consistency. 0=absent · 1=impaired · 2=normal</p>
<div class="fg2">
  <div class="f"><label>Light Touch</label>
    <select id="spLT" onchange="calc()">
      ${selOpts([[2,'2 — Intact (>70% correct)'],[1,'1 — Reduced / inconsistent (30–70%)'],[0,'0 — Absent (<30% correct)']],1)}
    </select>
  </div>
  <div class="f"><label>Proprioception (thumb IP + great toe MTP)</label>
    <select id="spProp" onchange="calc()">
      ${selOpts([[2,'2 — Intact (4–5/5 correct)'],[1,'1 — Partial (3/5 correct)'],[0,'0 — Absent (≥3/5 wrong)']],1)}
    </select>
  </div>
</div>
<div class="fg2">
  <div class="f"><label>Pain / Temperature</label>
    <select id="spPT" onchange="calc()">
      ${selOpts([[2,'2 — Intact'],[1,'1 — Reduced / inconsistent'],[0,'0 — Absent']],1)}
    </select>
  </div>
  <div class="f"><label>Vision / Visual Field (confrontation)</label>
    <select id="spVis" onchange="calc()">
      ${selOpts([[2,'2 — Normal'],[1,'1 — Partial deficit'],[0,'0 — Severe field loss / neglect']],1)}
    </select>
  </div>
</div>
<div class="fg2">
  <div class="f"><label>Neglect / Spatial Awareness</label>
    <select id="spNegl" onchange="calc()">
      ${selOpts([[2,'2 — Absent (no neglect)'],[1,'1 — Mild / inconsistent'],[0,'0 — Clear neglect']],1)}
    </select>
  </div>
</div>`,

`<div class="sec-h">Mobility — Functional Ambulation Categories (FAC)</div>
<div class="fg2">
  <div class="f"><label>FAC Score (0–5)</label>
    <select id="fac" onchange="calc()">
      ${selOpts([[5,'5 — Independent everywhere (stairs, slopes, uneven)'],[4,'4 — Independent on level ground'],[3,'3 — Supervision only, no physical contact'],[2,'2 — Intermittent physical support'],[1,'1 — Continuous physical support required'],[0,'0 — Non-functional ambulation']],2)}
    </select>
  </div>
</div>`,

`<div class="sec-h">Endurance / Fatigue</div>
<div class="fg2">
  <div class="f"><label>Therapy Tolerance Time (0–2)</label>
    <select id="cfTol" onchange="calc()">
      ${selOpts([[2,'2 — ≥20 min active participation'],[1,'1 — 10–20 min active participation'],[0,'0 — <10 min active participation']],1)}
    </select>
  </div>
  <div class="f"><label>Repeat Task Consistency (0–2)</label>
    <select id="cfRep" onchange="calc()">
      ${selOpts([[2,'2 — Same performance on repeat task'],[1,'1 — Worse on repeat'],[0,'0 — Cannot repeat task']],1)}
    </select>
  </div>
</div>`,

`<div class="sec-h">Motor FIM (1–7 each)</div>
<p class="hint">Score what patient does today, not potential. 7=complete independence · 6=modified independence · 5=supervision/setup · 4=minimal assist (≥75%) · 3=moderate assist (50–74%) · 2=maximal assist (25–49%) · 1=total assist</p>
<div class="sub">Self-care (6 items)</div>
<div class="fg2">
  <div class="f"><label>Eating</label><select id="fimEat" onchange="calc()">${fimOpts()}</select></div>
  <div class="f"><label>Grooming</label><select id="fimGrm" onchange="calc()">${fimOpts()}</select></div>
</div>
<div class="fg2">
  <div class="f"><label>Bathing</label><select id="fimBath" onchange="calc()">${fimOpts()}</select></div>
  <div class="f"><label>Dressing upper body</label><select id="fimDrU" onchange="calc()">${fimOpts()}</select></div>
</div>
<div class="fg2">
  <div class="f"><label>Dressing lower body</label><select id="fimDrL" onchange="calc()">${fimOpts()}</select></div>
  <div class="f"><label>Toileting</label><select id="fimToi" onchange="calc()">${fimOpts()}</select></div>
</div>
<div class="sub">Sphincter Control (2 items)</div>
<div class="fg2">
  <div class="f"><label>Bladder management</label><select id="fimBld" onchange="calc()">${fimOpts()}</select></div>
  <div class="f"><label>Bowel management</label><select id="fimBwl" onchange="calc()">${fimOpts()}</select></div>
</div>
<div class="sub">Transfers (3 items)</div>
<div class="fg2">
  <div class="f"><label>Transfer bed / chair / wheelchair</label><select id="fimTrBed" onchange="calc()">${fimOpts()}</select></div>
  <div class="f"><label>Transfer toilet</label><select id="fimTrToi" onchange="calc()">${fimOpts()}</select></div>
</div>
<div class="fg2">
  <div class="f"><label>Transfer tub / shower</label><select id="fimTrTub" onchange="calc()">${fimOpts()}</select></div>
</div>
<div class="sub">Locomotion (2 items)</div>
<div class="fg2">
  <div class="f"><label>Walk / Wheelchair</label><select id="fimWalk" onchange="calc()">${fimOpts()}</select></div>
  <div class="f"><label>Stairs</label><select id="fimStair" onchange="calc()">${fimOpts(3)}</select></div>
</div>`
];

function buildTabs() {
  const bar = document.getElementById('tabBar');
  const secWrap = document.getElementById('sections');
  TABS.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i===0?' on':'');
    btn.textContent = t;
    btn.onclick = () => goTab(i);
    bar.appendChild(btn);

    const sec = document.createElement('div');
    sec.className = 'sec' + (i===0?' on':'');
    sec.id = 'sec'+i;

    const navPrev = i > 0 ? `<button class="nbtn" onclick="goTab(${i-1})">← ${TABS[i-1]}</button>` : `<div></div>`;
    const navNext = i < TABS.length-1 ? `<button class="nbtn p" onclick="goTab(${i+1})">Next: ${TABS[i+1]} →</button>` : `<div></div>`;

    sec.innerHTML = SECTION_HTML[i] + `<div class="nav-row">${navPrev}${navNext}</div>`;
    secWrap.appendChild(sec);
  });
}

function goTab(i) {
  document.querySelectorAll('.tab').forEach((t,j) => t.className = 'tab'+(j===i?' on':''));
  document.querySelectorAll('.sec').forEach((s,j) => s.className = 'sec'+(j===i?' on':''));
}

function setCogMode(m) {
  cogMode = m;
  document.getElementById('gcsBtn').className = 'tb'+(m==='gcs'?' on':'');
  document.getElementById('mmseBtn').className = 'tb'+(m==='mmse'?' on':'');
  document.getElementById('gcsDiv').style.display = m==='gcs'?'block':'none';
  document.getElementById('mmseDiv').style.display = m==='mmse'?'block':'none';
  calc();
}

function gv(id) { return parseInt(document.getElementById(id).value)||0; }

function calc() {
  let C;
  if (cogMode === 'gcs') {
    const gcs = gv('gcsE') + gv('gcsV') + gv('gcsM');
    C = (gcs / 15) * 100;
  } else {
    const mmse = gv('mmseA')+gv('mmseB')+gv('mmseC')+gv('mmseD')+gv('mmseE')+gv('mmseF')+gv('mmseG');
    C = (mmse / 30) * 100;
  }
  const overlay = gv('cmdFol') + gv('digitSpan');
  const overlayPct = (overlay / 4) * 100;
  const C_final = (0.7 * C) + (0.3 * overlayPct);

  const ulMAS = gv('masShAdd')+gv('masElFx')+gv('masFAPr')+gv('masWrFx')+gv('masFinFx');
  const llMAS = gv('masHipAd')+gv('masKnee')+gv('masAnkPF')+gv('masToeFx');
  const ULtp = (ulMAS / 25) * 100;
  const LLtp = (llMAS / 20) * 100;
  const TS = (ULtp + LLtp) / 2;

  const ulMRC = gv('mrcShAb')+gv('mrcElFx')+gv('mrcWrEx')+gv('mrcFinFx')+gv('mrcFinAb');
  const llMRC = gv('mrcHipFx')+gv('mrcKnEx')+gv('mrcAnkDF')+gv('mrcGrToe')+gv('mrcPF');
  const S = ((ulMRC/25)+(llMRC/25))/2*100;

  const TR = gv('trunk');
  const TR_pct = (TR/2)*100;

  const taskSum = gv('tskReach')+gv('tskGrasp')+gv('tskRelease')+gv('tskSitBal')+gv('tskSTS')+gv('tskStBal')+gv('tskWalk');
  const T_pct = (taskSum/14)*100;

  const M_final = (0.40*S) + (0.40*T_pct) + (0.20*TR_pct);
  const ME = M_final * (1 - TS/200);

  const spSum = gv('spLT')+gv('spProp')+gv('spPT')+gv('spVis')+gv('spNegl');
  const SP_pct = (spSum/10)*100;

  const FAC = gv('fac');
  const FAC_pct = (FAC/5)*100;

  const CF = gv('cfTol') + gv('cfRep');
  const CF_pct = (CF/4)*100;

  const fimSum = gv('fimEat')+gv('fimGrm')+gv('fimBath')+gv('fimDrU')+gv('fimDrL')+gv('fimToi')+gv('fimBld')+gv('fimBwl')+gv('fimTrBed')+gv('fimTrToi')+gv('fimTrTub')+gv('fimWalk')+gv('fimStair');
  const F = Math.max(0, Math.min(100, ((fimSum - 13) / 78) * 100));

  const GRS = (0.20*C_final)+(0.30*F)+(0.20*ME)+(0.15*FAC_pct)+(0.10*SP_pct)+(0.05*CF_pct);
  const RPI = (0.30*C_final)+(0.25*CF_pct)+(0.20*SP_pct)+(0.15*FAC_pct)+(0.10*(100-TS));

  renderResults({C_final, S, TS, TR_pct, T_pct, M_final, ME, SP_pct, FAC_pct, CF_pct, F, GRS, RPI, fimSum});
}

function badge(v, thresholds) {
  if (v >= thresholds[1]) return ['h-bg', thresholds[2]];
  if (v >= thresholds[0]) return ['m-bg', thresholds[3]];
  return ['l-bg', thresholds[4]];
}

function renderResults(d) {
  const grs = Math.round(d.GRS);
  const rpi = Math.round(d.RPI);

  const grsCat = grs >= 76 ? ['h-bg','High Recovery'] : grs >= 51 ? ['m-bg','Moderate Recovery'] : grs >= 26 ? ['m-bg','Low Recovery Stage'] : ['l-bg','Severe Disability'];
  const rpiCat = d.RPI >= 70 ? ['h-bg','High Potential'] : d.RPI >= 40 ? ['m-bg','Moderate Potential'] : ['l-bg','Low Potential'];

  document.getElementById('grsV').textContent = grs + '%';
  document.getElementById('grsBadge').className = 'bb ' + grsCat[0];
  document.getElementById('grsBadge').textContent = grsCat[1];

  document.getElementById('rpiV').textContent = rpi + '%';
  document.getElementById('rpiBadge').className = 'bb ' + rpiCat[0];
  document.getElementById('rpiBadge').textContent = rpiCat[1];

  const domains = [
    {lbl:'Cognition', v: Math.round(d.C_final)},
    {lbl:'Strength', v: Math.round(d.S)},
    {lbl:'Tone ctrl.', v: Math.round(100-d.TS)},
    {lbl:'Trunk', v: Math.round(d.TR_pct)},
    {lbl:'Motor Tasks', v: Math.round(d.T_pct)},
    {lbl:'Motor Final', v: Math.round(d.M_final)},
    {lbl:'Mot. Efficiency', v: Math.round(d.ME)},
    {lbl:'Sensory', v: Math.round(d.SP_pct)},
    {lbl:'Mobility (FAC)', v: Math.round(d.FAC_pct)},
    {lbl:'Endurance', v: Math.round(d.CF_pct)},
    {lbl:'FIM Function', v: Math.round(d.F)},
  ];

  const domEl = document.getElementById('domainList');
  domEl.innerHTML = domains.map(dm => {
    const color = dm.v >= 70 ? '#16a34a' : dm.v >= 40 ? '#b45309' : '#dc2626';
    return `<div class="domain-row">
      <div class="dr-lbl">${dm.lbl}</div>
      <div class="dr-bar-wrap"><div class="dr-bar" style="width:${dm.v}%;background:${color}"></div></div>
      <div class="dr-val">${dm.v}%</div>
    </div>`;
  }).join('');

  updateRadar(d);
  renderTriage(d);
  renderFlags(d);
}

function updateRadar(d) {
  const labels = ['Cognition','Strength','Tone ctrl.','Sensory','Mobility','Endurance','FIM Func.','Mot. Tasks'];
  const values = [
    Math.round(d.C_final),
    Math.round(d.S),
    Math.round(100 - d.TS),
    Math.round(d.SP_pct),
    Math.round(d.FAC_pct),
    Math.round(d.CF_pct),
    Math.round(d.F),
    Math.round(d.T_pct)
  ];

  if (radarChart) {
    radarChart.data.labels = labels;
    radarChart.data.datasets[0].data = values;
    radarChart.update();
    return;
  }

  const ctx = document.getElementById('radar').getContext('2d');
  radarChart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels,
      datasets: [{
        label: 'Patient Profile',
        data: values,
        fill: true,
        backgroundColor: 'rgba(13,115,119,0.15)',
        borderColor: '#0d7377',
        borderWidth: 2,
        pointBackgroundColor: '#0d7377',
        pointRadius: 3
      }]
    },
    options: {
      responsive: false,
      scales: {
        r: {
          min: 0, max: 100,
          ticks: { stepSize: 25, font: {size: 9}, color: '#94a3b8' },
          pointLabels: { font: {size: 10}, color: '#475569' },
          grid: { color: '#dde3eb' },
          angleLines: { color: '#dde3eb' }
        }
      },
      plugins: { legend: { display: false } }
    }
  });
}

function renderTriage(d) {
  let cat = '', desc = '';
  const {GRS, RPI} = d;
  if (GRS > 75 && d.fimSum > 80 && d.FAC_pct >= 80) {
    cat = 'Category 4 — OPD Maintenance';
    desc = 'Patient has achieved functional independence. Suitable for outpatient maintenance.';
  } else if (RPI > 70) {
    cat = 'Category 1 — Intensive Rehab Candidate';
    desc = 'High potential for gains. Medically stable, endurance acceptable. Goal: aggressive task-specific training.';
  } else if (RPI >= 40) {
    cat = 'Category 2 — Structured Rehab Candidate';
    desc = 'Moderate potential. Requires supervised rehab plan with concurrent caregiver training.';
  } else {
    cat = 'Category 3 — Supportive / Slow Recovery';
    desc = 'Low potential presently. Focus on caregiver training, positioning, and complication prevention.';
  }
  document.getElementById('triageV').textContent = cat;
  document.getElementById('triageD').textContent = desc;
}

function renderFlags(d) {
  const flags = [];
  if (d.ME < 40 && d.TS > 50) flags.push({s:'alert', msg:'Tone limiting motor output — prioritise spasticity management before task training'});
  if (d.F < 40 && d.M_final > 50) flags.push({s:'warn', msg:'ADL carryover gap — motor improving but FIM low. Add task-based ADL + caregiver training'});
  if (d.SP_pct < 40) flags.push({s:'alert', msg:'Sensory deficit (<40%) — sensory feedback insufficient for motor learning. Sensory re-education + neglect training mandatory'});
  if (d.C_final < 50) flags.push({s:'warn', msg:'Cognition <50% — rehab learning limited. Use repetition + caregiver-driven rehab model'});
  if (d.CF_pct < 40) flags.push({s:'warn', msg:'Fatigue limiting therapy dosage — implement pacing + graded endurance protocol'});
  if (d.TR_pct < 50) flags.push({s:'warn', msg:'Trunk unstable — core activation and sitting dynamic training should be the primary focus'});
  if (d.TS > 60) flags.push({s:'alert', msg:'Severe tone (>60%) — pharmacological and physical management of spasticity is a priority'});

  const fc = document.getElementById('flagsCard');
  const fl = document.getElementById('flagsList');
  if (flags.length === 0) { fc.style.display = 'none'; return; }
  fc.style.display = 'block';
  fl.innerHTML = flags.map(f => `<div class="flag-item"><div class="fd f${f.s==='alert'?'a':'w'}"></div><div>${f.msg}</div></div>`).join('');
}

buildTabs();
calc();
</script>
</body>
</html>
